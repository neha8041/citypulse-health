<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CityPulse Health</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f7fa;
    --panel: #ffffff;
    --text: #1a1f26;
    --muted: #6b7280;
    --accent: #2563eb;
    --bot-bubble: #eef1f5;
    --user-bubble: #2563eb;
    --user-text: #ffffff;
    --border: #e2e5ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e6e8eb;
      --muted: #9aa1ac;
      --accent: #5b8def;
      --bot-bubble: #232732;
      --user-bubble: #5b8def;
      --user-text: #0f1115;
      --border: #2a2f3a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .app {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  header h1 {
    font-size: 1.4rem;
    margin: 0 0 4px;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .briefing-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
  }
  .briefing-bar button {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .briefing-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .briefing-bar span { color: var(--muted); font-size: 0.85rem; }

  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 60vh;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .msg.bot {
    background: var(--bot-bubble);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: var(--user-bubble);
    color: var(--user-text);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  form {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  input[type="text"] {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.92rem;
  }
  input[type="text"]:focus { outline: 2px solid var(--accent); }
  button.send {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button.send:disabled { opacity: 0.6; cursor: default; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>CityPulse Health</h1>
      <p>Agent-based public health briefing assistant</p>
    </header>

    <div class="card briefing-bar">
      <span>Ask the coordinating agent for the daily briefing</span>
      <button id="briefingBtn" type="button">Get morning briefing</button>
    </div>

    <div class="card chat">
      <div id="messages" class="messages"></div>
      <form id="chatForm">
        <input id="chatInput" type="text" placeholder="Ask the chat agent something..." autocomplete="off" />
        <button class="send" type="submit">Send</button>
      </form>
    </div>

    <footer>Chat replies are a placeholder LLM response for now — swap in a real model when ready.</footer>
  </div>

<script>
  const messagesEl = document.getElementById("messages");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("chatInput");
  const briefingBtn = document.getElementById("briefingBtn");

  function addMessage(text, sender) {
    const el = document.createElement("div");
    el.className = "msg " + sender;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  addMessage("Hi! I'm the CityPulse Health chat agent. Ask me anything, or fetch the morning briefing above.", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      addMessage(data.reply ?? "No reply from agent.", "bot");
    } catch (err) {
      addMessage("Error reaching the chat agent.", "bot");
    }
  });

  briefingBtn.addEventListener("click", async () => {
    briefingBtn.disabled = true;
    try {
      const res = await fetch("/briefing");
      const data = await res.json();
      addMessage(
        `${data.morning_briefing}\n\n${data.explanation}\n\nActions:\n- ${data.actions.join("\n- ")}`,
        "bot"
      );
    } catch (err) {
      addMessage("Error fetching the briefing.", "bot");
    } finally {
      briefingBtn.disabled = false;
    }
  });
</script>
</body>
</html>
